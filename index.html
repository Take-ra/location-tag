<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Location Tag Prototype</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* 登録用UIのスタイリング */
      #ui-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: rgba(255, 255, 255, 0.95);
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        display: flex;
        gap: 10px;
        width: 85%;
        max-width: 400px;
      }
      #tag-input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }
      #save-btn {
        background: #E8A5B3;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="ui-container">
      <input type="text" id="tag-input" placeholder="この場所に思い出をTag付け...">
      <button id="save-btn" onclick="saveTag()">Tagを残す</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-marker preset="hiro" id="marker">
        <a-text 
          id="tag-board"
          value="Loading..." 
          position="0 1.2 0" 
          scale="1.5 1.5 1.5"
          color="#2D2D2D"
          align="center"
          font="https://raw.githubusercontent.com/etiennepinchon/aframe-fonts/master/fonts/notosansjapanese/NotoSansJapanese-Bold.json"
          shader="msdf"
          bg-color="#FFF">
        </a-text>

        <a-sphere position="0 0.3 0" radius="0.3" color="#E8A5B3" opacity="0.6"></a-sphere>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // ARのテキストを安全に書き換える関数
      function applyTextToAR(text) {
        const tagBoard = document.getElementById('tag-board');
        if (tagBoard) {
          tagBoard.setAttribute('value', text);
        }
      }

      // A-Frameのシステムが完全に立ち上がってから記憶を読み込む（消えるバグ対策）
      document.querySelector('a-scene').addEventListener('loaded', function () {
        setTimeout(function() {
          const savedText = localStorage.getItem('location_tag_memory');
          if (savedText) {
            applyTextToAR(savedText);
          } else {
            applyTextToAR("ここにTagを表示します");
          }
        }, 500); // 0.5秒だけ待って確実に描画させる
      });

      // 「Tagを残す」ボタンを押したときの処理
      function saveTag() {
        const inputField = document.getElementById('tag-input');
        const text = inputField.value;
        
        if (text.trim() === "") {
          alert("思い出の言葉を入力してください！");
          return;
        }

        // 1. スマホのブラウザに記憶を永続保存（これで再読み込みしても消えない）
        localStorage.setItem('location_tag_memory', text);
        
        // 2. AR空間の文字を安全に上書き（フリーズ対策）
        applyTextToAR(text);
        
        // 3. 入力欄をクリアして通知
        inputField.value = "";
        alert("この場所にTagをピン留めしました！");
      }
    </script>
  </body>
</html>
