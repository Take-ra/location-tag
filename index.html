<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Location Tag - AR Memory App</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
  <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* =========================================
       ベース・初期化
    ========================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    /* 【必須実装】iOS Safariでのビデオコントロール勝手表示を防ぐ */
    video {
      pointer-events: none !important;
    }
    video::-webkit-media-controls {
      display: none !important;
    }

    /* =========================================
       UIレイヤー（グラスモーフィズムデザイン）
    ========================================= */
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999;
      pointer-events: none; /* UI要素以外はタップを透過してAR空間へ */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .glass {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      pointer-events: auto;
    }

    /* 各ビューの切り替え用 */
    .view-section {
      display: none;
      flex: 1;
      width: 100%;
      overflow-y: auto;
    }
    .view-section.active {
      display: block;
    }

    /* --- ARビュー用上部バー --- */
    #top-bar {
      margin: calc(env(safe-area-inset-top) + 16px) 16px 16px;
      padding: 12px;
      border-radius: 16px;
      display: flex;
      gap: 8px;
    }
    #memory-input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.8);
    }
    #save-btn {
      background: #E8A5B3;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #save-btn:active {
      background: #d68b9a;
    }

    /* --- 思い出一覧ビュー --- */
    #list-view {
      padding: calc(env(safe-area-inset-top) + 24px) 16px 100px;
    }
    .list-container {
      border-radius: 16px;
      padding: 20px;
    }
    .list-container h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
    }
    .memory-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .memory-item:last-child {
      border-bottom: none;
    }
    .memory-text {
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }
    .delete-btn {
      background: rgba(255, 80, 80, 0.8);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 12px;
      flex-shrink: 0;
    }

    /* --- ボトムナビゲーション --- */
    #bottom-nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      border-radius: 20px 20px 0 0;
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      color: #777;
      cursor: pointer;
      transition: color 0.3s;
    }
    .nav-btn.active {
      color: #E8A5B3;
    }
  </style>

  <script>
    /* =========================================
       A-Frame 独自コンポーネント
    ========================================= */
    // 外部コンポーネントを使わず、A-Frame標準機能の組み合わせでカメラを向くようにする
    AFRAME.registerComponent('face-camera', {
      tick: function () {
        const camera = document.querySelector('a-camera');
        if (camera && camera.object3D) {
          const camPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(camPos);
          // Y軸方向の回転のみ反映（看板が上下に傾くのを防ぐ）
          camPos.y = this.el.object3D.position.y;
          this.el.object3D.lookAt(camPos);
        }
      }
    });

    /* =========================================
       アプリケーションロジック
    ========================================= */
    document.addEventListener('DOMContentLoaded', () => {
      
      // --- 1. ストレージと初期化処理 ---
      const STORAGE_KEY = 'location_tag_memories';
      let memories = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      // 初回起動時のダミーデータ投入
      if (memories.length === 0) {
        memories = [
          { id: Date.now().toString(), lat: 41.841, lon: 140.766, text: 'ここで友達と語り合った！' },
          { id: (Date.now() + 1).toString(), lat: 41.842, lon: 140.767, text: 'テスト用の思い出タグ' }
        ];
        saveToLocalStorage();
      }

      // --- 2. バグ回避策: カメラフリーズ対策 ---
      const fixVideoFreeze = () => {
        const video = document.querySelector('video');
        if (video) video.play().catch(e => console.warn('Video play blocked:', e));
      };
      // タブ切り替え時などに強制再開
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') fixVideoFreeze();
      });

      // --- 3. AR空間への描画 ---
      const scene = document.querySelector('a-scene');
      
      const renderMemoryInAR = (memory) => {
        // 【必須実装】GPS取得直後のオブジェクトロストを防ぐため setTimeout で遅延追加
        setTimeout(() => {
          const entity = document.createElement('a-entity');
          entity.setAttribute('id', `ar-${memory.id}`);
          entity.setAttribute('gps-entity-place', `latitude: ${memory.lat}; longitude: ${memory.lon};`);
          entity.setAttribute('face-camera', '');

          // 半透明ピンクの球体
          const sphere = document.createElement('a-sphere');
          sphere.setAttribute('radius', '0.5');
          sphere.setAttribute('color', '#E8A5B3');
          sphere.setAttribute('opacity', '0.7');
          sphere.setAttribute('position', '0 0.5 0');
          entity.appendChild(sphere);

          // テキスト看板
          const textEl = document.createElement('a-text');
          textEl.setAttribute('value', memory.text);
          // 【必須実装】日本語対応フォント
          textEl.setAttribute('font', 'https://cdn.jsdelivr.net/gh/etiennepinchon/aframe-fonts@master/fonts/notosanscjkjp/NotoSansCJKjp-Bold.json');
          textEl.setAttribute('align', 'center');
          textEl.setAttribute('color', '#333');
          textEl.setAttribute('position', '0 1.5 0');
          textEl.setAttribute('scale', '1.5 1.5 1.5');
          
          // 【必須実装】背景板とZファイティング回避
          textEl.setAttribute('geometry', 'primitive: plane; width: auto; height: auto;');
          textEl.setAttribute('material', 'color: #ffffff; opacity: 0.9;');
          textEl.setAttribute('z-offset', '0.1'); 
          
          entity.appendChild(textEl);
          scene.appendChild(entity);
        }, 500);
      };

      // 既存データの初期描画
      memories.forEach(renderMemoryInAR);

      // --- 4. リストビューへの描画と削除機能 ---
      const memoryListEl = document.getElementById('memory-list');

      const renderList = () => {
        memoryListEl.innerHTML = '';
        memories.forEach(memory => {
          const li = document.createElement('li');
          li.className = 'memory-item';
          
          const textSpan = document.createElement('span');
          textSpan.className = 'memory-text';
          textSpan.textContent = memory.text;
          
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '削除';
          deleteBtn.onclick = () => deleteMemory(memory.id);

          li.appendChild(textSpan);
          li.appendChild(deleteBtn);
          memoryListEl.appendChild(li);
        });
      };

      const deleteMemory = (id) => {
        // localStorageから削除
        memories = memories.filter(m => m.id !== id);
        saveToLocalStorage();
        // DOM(リスト)更新
        renderList();
        // AR空間から即座に削除
        const arEntity = document.getElementById(`ar-${id}`);
        if (arEntity) arEntity.parentNode.removeChild(arEntity);
      };

      function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
      }
      
      // 初期リスト描画
      renderList();

      // --- 5. 新規メモリーの保存（GPS取得） ---
      const saveBtn = document.getElementById('save-btn');
      const inputEl = document.getElementById('memory-input');

      saveBtn.addEventListener('click', () => {
        const text = inputEl.value.trim();
        if (!text) return alert('思い出を入力してください。');

        saveBtn.textContent = '取得中...';
        saveBtn.disabled = true;

        if (!navigator.geolocation) {
          alert('GPSがサポートされていません。');
          resetBtn();
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const newMemory = {
              id: Date.now().toString(),
              lat: position.coords.latitude,
              lon: position.coords.longitude,
              text: text
            };

            // データ保存と反映
            memories.push(newMemory);
            saveToLocalStorage();
            renderMemoryInAR(newMemory);
            renderList();

            inputEl.value = '';
            alert('思い出を現在地にピン留めしました！');
            resetBtn();
            fixVideoFreeze(); // GPS許可ダイアログ復帰時などの対策
          },
          (error) => {
            alert('位置情報の取得に失敗しました。設定を確認してください。');
            console.error(error);
            resetBtn();
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });

      const resetBtn = () => {
        saveBtn.textContent = 'ピン留め';
        saveBtn.disabled = false;
      };

      // --- 6. ページ遷移（SPA風DOM切り替え） ---
      const navAr = document.getElementById('nav-ar');
      const navList = document.getElementById('nav-list');
      const viewAr = document.getElementById('ar-view');
      const viewList = document.getElementById('list-view');

      navAr.addEventListener('click', () => {
        navAr.classList.add('active');
        navList.classList.remove('active');
        viewAr.classList.add('active');
        viewList.classList.remove('active');
        fixVideoFreeze();
      });

      navList.addEventListener('click', () => {
        navList.classList.add('active');
        navAr.classList.remove('active');
        viewList.classList.add('active');
        viewAr.classList.remove('active');
      });
    });
  </script>
</head>

<body>

  <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>

  <div id="ui-layer">
    
    <div id="ar-view" class="view-section active">
      <div id="top-bar" class="glass">
        <input type="text" id="memory-input" placeholder="今ここで何してる？">
        <button id="save-btn">ピン留め</button>
      </div>
    </div>

    <div id="list-view" class="view-section">
      <div class="glass list-container">
        <h2>📖 思い出一覧</h2>
        <ul id="memory-list" style="list-style: none;"></ul>
      </div>
    </div>

    <div id="bottom-nav" class="glass">
      <button id="nav-ar" class="nav-btn active">📷 ARカメラ</button>
      <button id="nav-list" class="nav-btn">📖 思い出一覧</button>
    </div>

  </div>

</body>
</html>
